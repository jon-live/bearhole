<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#FBF6EE"/>
  <text x="40" y="48" font-family="Georgia, serif" fill="#C36A45" font-size="24">Floor plan — replace with assets/images/floorplan.png</text>

  <!-- ===== Floor 1 (left) : Room 5, Room 6 ===== -->
  <text x="70" y="100" font-family="Georgia, serif" fill="#3A312A" font-size="34">Floor 1</text>
  <g fill="none" stroke="#3A312A" stroke-width="6">
    <rect x="70" y="120" width="470" height="560"/>
    <line x1="70" y1="400" x2="540" y2="400"/>
    <line x1="305" y1="120" x2="305" y2="400"/>
  </g>
  <g font-family="Helvetica, sans-serif" fill="#7C6F60" font-size="26" text-anchor="middle">
    <text x="187" y="270">Room 5</text>
    <text x="422" y="270">Room 6</text>
    <text x="305" y="550">Living / Kitchen</text>
  </g>

  <!-- ===== Floor 2 (right) : Room 1-4 ===== -->
  <text x="660" y="100" font-family="Georgia, serif" fill="#3A312A" font-size="34">Floor 2</text>
  <g fill="none" stroke="#3A312A" stroke-width="6">
    <rect x="660" y="120" width="470" height="560"/>
    <line x1="895" y1="120" x2="895" y2="680"/>
    <line x1="660" y1="400" x2="1130" y2="400"/>
  </g>
  <g font-family="Helvetica, sans-serif" fill="#7C6F60" font-size="26" text-anchor="middle">
    <text x="777" y="270">Room 1</text>
    <text x="1012" y="270">Room 2</text>
    <text x="777" y="550">Room 3</text>
    <text x="1012" y="550">Room 4</text>
  </g>
</svg>
